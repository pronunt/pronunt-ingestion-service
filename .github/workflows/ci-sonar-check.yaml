name: Sonar Code Quality

on:
  workflow_call:
    outputs:
      quality_gate_status:
        value: ${{ jobs.code-quality.outputs.quality_gate_status }}
      notify_tool:
        value: ${{ jobs.code-quality.outputs.notify_tool }}
      notify_title:
        value: ${{ jobs.code-quality.outputs.notify_title }}
      notify_summary:
        value: ${{ jobs.code-quality.outputs.notify_summary }}

jobs:
  code-quality:
    runs-on: ubuntu-latest
    outputs:
      quality_gate_status: ${{ steps.set_outputs.outputs.quality_gate_status }}
      notify_tool: ${{ steps.set_outputs.outputs.notify_tool }}
      notify_title: ${{ steps.set_outputs.outputs.notify_title }}
      notify_summary: ${{ steps.set_outputs.outputs.notify_summary }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Cache Sonar
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          args: -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Quality Gate
        id: qg
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true
      - name: Set outputs
        id: set_outputs
        run: |
          STATUS="${{ steps.qg.outputs.quality-gate-status }}"
          echo "quality_gate_status=$STATUS" >> $GITHUB_OUTPUT
          echo "notify_tool=sonar" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "FAILED" ]; then
            echo "notify_title=Sonar Failed" >> $GITHUB_OUTPUT
            echo "notify_summary=Quality gate failed" >> $GITHUB_OUTPUT
          else
            echo "notify_title=Sonar Passed" >> $GITHUB_OUTPUT
            echo "notify_summary=Quality gate passed" >> $GITHUB_OUTPUT
          fi
      - name: Fail if quality gate failed
        if: ${{ steps.qg.outputs.quality-gate-status == 'FAILED' }}
        run: exit 1
