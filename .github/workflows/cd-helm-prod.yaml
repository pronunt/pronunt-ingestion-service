name: Create Helm Prod PR

on:
  workflow_call:
    inputs:
      helm_repo:
        required: true
        type: string
      helm_base_branch:
        required: false
        default: prod
        type: string
      values_file:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      release_tag:
        required: false
        default: ""
        type: string
      yaml_path:
        required: false
        default: .image.tag
        type: string
      commit_message:
        required: false
        default: "release: update prod image tag"
        type: string
      release_branch_prefix:
        required: false
        default: release
        type: string
      pr_title:
        required: false
        default: ""
        type: string
      pr_body:
        required: false
        default: ""
        type: string
    secrets:
      HELM_REPO_TOKEN:
        required: true

jobs:
  create-prod-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.helm_repo }}
          ref: ${{ inputs.helm_base_branch }}
          token: ${{ secrets.HELM_REPO_TOKEN }}
          path: helm-repo

      - name: Validate values file exists
        working-directory: helm-repo
        run: test -f "${{ inputs.values_file }}"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update values file
        working-directory: helm-repo
        env:
          NEW_TAG: ${{ inputs.image_tag }}
          YAML_PATH: ${{ inputs.yaml_path }}
          VALUES_FILE: ${{ inputs.values_file }}
        run: |
          yq -i "${YAML_PATH} = strenv(NEW_TAG)" "$VALUES_FILE"
          cat "$VALUES_FILE"

      - name: Prepare release branch
        id: meta
        working-directory: helm-repo
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          VALUES_FILE_INPUT: ${{ inputs.values_file }}
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
          PR_TITLE_INPUT: ${{ inputs.pr_title }}
          PR_BODY_INPUT: ${{ inputs.pr_body }}
          RELEASE_BRANCH_PREFIX_INPUT: ${{ inputs.release_branch_prefix }}
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY##*/}"
          image_tag_slug="$(echo "${IMAGE_TAG_INPUT}" | tr '/:@ ' '----')"
          branch_name="${RELEASE_BRANCH_PREFIX_INPUT}/${repo_name}/${image_tag_slug}"

          if [[ -n "${PR_TITLE_INPUT}" ]]; then
            pr_title="${PR_TITLE_INPUT}"
          else
            pr_title="release(${repo_name}): promote image to ${IMAGE_TAG_INPUT}"
          fi

          if [[ -n "${PR_BODY_INPUT}" ]]; then
            pr_body="${PR_BODY_INPUT}"
          else
            source_release="${RELEASE_TAG:-manual}"
            printf -v pr_body 'This PR updates `%s` for the released image.\n\n- Service: `%s`\n- Image tag: `%s`\n- Source release: `%s`\n' "${VALUES_FILE_INPUT}" "${repo_name}" "${IMAGE_TAG_INPUT}" "${source_release}"
          fi

          {
            echo "branch_name=${branch_name}"
            echo "pr_title=${pr_title}"
            echo "pr_body<<EOF"
            printf '%s\n' "${pr_body}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and push release branch
        id: commit
        working-directory: helm-repo
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.meta.outputs.branch_name }}"
          git add "${{ inputs.values_file }}"
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "${{ inputs.commit_message }}"
          git push origin HEAD:"${{ steps.meta.outputs.branch_name }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or reuse PR
        if: steps.commit.outputs.changed == 'true'
        working-directory: helm-repo
        env:
          GH_TOKEN: ${{ secrets.HELM_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          existing_pr="$(gh pr list \
            --repo "${{ inputs.helm_repo }}" \
            --base "${{ inputs.helm_base_branch }}" \
            --head "${{ steps.meta.outputs.branch_name }}" \
            --json url \
            --jq '.[0].url')"

          if [[ -n "${existing_pr}" ]]; then
            echo "PR already exists: ${existing_pr}"
            exit 0
          fi

          gh pr create \
            --repo "${{ inputs.helm_repo }}" \
            --base "${{ inputs.helm_base_branch }}" \
            --head "${{ steps.meta.outputs.branch_name }}" \
            --title "${{ steps.meta.outputs.pr_title }}" \
            --body "${{ steps.meta.outputs.pr_body }}"
